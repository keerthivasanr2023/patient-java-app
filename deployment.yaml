apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-java-app-deployment
  labels:
    app: patient-java-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: patient-java-app
  template:
    metadata:
      labels:
        app: patient-java-app
    spec:
      containers:
        - name: patient-java-app
          image: keerthivasan08/patient-java-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: patient-java-app-service
spec:
  type: NodePort
  selector:
    app: patient-java-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30007